<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password — QAonAir BRAHL</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="stylesheet" href="/assets/forms.css" />
  <link rel="stylesheet" href="/assets/site-chrome.css" />
  <link rel="stylesheet" href="/assets/signin.css" />
</head>
<body class="tc-page">
  <header class="site-top">
    <a class="site-brand" href="/" aria-label="QA on Air home">
      <span class="site-brand-mark" aria-hidden="true">QA</span>
      <span class="site-brand-text">
        <span class="site-brand-name">QA on Air</span>
        <span class="site-brand-sub">BRAHL</span>
      </span>
    </a>
    <nav class="site-top-nav" aria-label="Site">
      <a href="/pricing">Pricing</a>
      <a href="/about">About</a>
      <a href="/login">Sign in</a>
      <a class="site-top-cta" href="/signup">Start</a>
    </nav>
  </header>
  <header class="tc-page-header">
    <div>
      <p class="tc-kicker">QA on Air · BRAHL</p>
      <h1>Reset password</h1>
      <p class="tc-lead">Request a reset link, then set a new password.</p>
    </div>
  </header>
  <main class="tc-shell">
    <form id="forgot-form" class="tc-form">
      <h2 class="tc-panel-title">1 · Request reset</h2>
      <div class="tc-field">
        <label for="forgot-email">Email</label>
        <input type="email" id="forgot-email" required autocomplete="email" />
      </div>
      <p id="forgot-msg" class="tc-hint" hidden></p>
      <button type="submit" class="tc-btn tc-btn-primary tc-btn-block">Send reset</button>
    </form>
    <form id="reset-form" class="tc-form" style="margin-top: 1.5rem">
      <h2 class="tc-panel-title">2 · New password</h2>
      <div class="tc-field">
        <label for="reset-token">Reset token</label>
        <input type="text" id="reset-token" required autocomplete="off" />
      </div>
      <div class="tc-field">
        <label for="reset-password">New password (8+)</label>
        <input type="password" id="reset-password" required minlength="8" autocomplete="new-password" />
      </div>
      <p id="reset-msg" class="tc-hint" hidden></p>
      <button type="submit" class="tc-btn tc-btn-primary tc-btn-block">Update password</button>
    </form>
    <p class="tc-footer-links"><a href="/login">Back to log in</a></p>
  </main>
  <script>
    const $ = (s) => document.querySelector(s);
    const params = new URLSearchParams(location.search);
    if (params.get("token")) $("#reset-token").value = params.get("token");
    $("#forgot-form").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const msg = $("#forgot-msg");
      msg.hidden = true;
      const res = await fetch("/api/auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: $("#forgot-email").value.trim() }),
      });
      const data = await res.json().catch(() => ({}));
      msg.hidden = false;
      msg.className = "tc-hint";
      msg.textContent = data.reset_token
        ? `${data.message} Dev token: ${data.reset_token}`
        : data.message || "Request sent.";
      if (data.reset_token) $("#reset-token").value = data.reset_token;
    });
    $("#reset-form").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const msg = $("#reset-msg");
      msg.hidden = true;
      const res = await fetch("/api/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          token: $("#reset-token").value.trim(),
          password: $("#reset-password").value,
        }),
      });
      const data = await res.json().catch(() => ({}));
      msg.hidden = false;
      if (!res.ok) {
        msg.className = "tc-error";
        msg.textContent = data.detail || res.statusText;
        return;
      }
      msg.className = "tc-hint";
      msg.textContent = data.message || "Password updated.";
      setTimeout(() => { location.href = "/login"; }, 1200);
    });
  </script>
</body>
</html>
