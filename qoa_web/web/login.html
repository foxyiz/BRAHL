<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in — QAonAir BRAHL</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="stylesheet" href="/assets/forms.css" />
  <link rel="stylesheet" href="/assets/signin.css" />
</head>
<body class="tc-page">
  <header class="tc-page-header">
    <div>
      <p class="tc-kicker">QAonAir · BRAHL</p>
      <h1>Log in</h1>
      <p class="tc-lead">Access your projects and BRAHL plans.</p>
    </div>
    <a href="/app" class="tc-btn tc-btn-ghost">Arena</a>
  </header>
  <main class="tc-shell">
    <h2 class="tc-panel-title">Continue with</h2>
    <div class="tc-social">
      <button type="button" class="tc-social-btn tc-social-google" data-provider="google"><span class="tc-social-mark">G</span> Google</button>
      <button type="button" class="tc-social-btn tc-social-facebook" data-provider="facebook"><span class="tc-social-mark">f</span> Facebook</button>
      <button type="button" class="tc-social-btn tc-social-whatsapp" data-provider="whatsapp"><span class="tc-social-mark">W</span> WhatsApp</button>
      <button type="button" class="tc-social-btn tc-social-instagram" data-provider="instagram"><span class="tc-social-mark">Ig</span> Instagram</button>
    </div>
    <div id="social-email-panel" class="tc-conditional" hidden>
      <div class="tc-field">
        <label for="social-email">Email for <span id="social-provider-label">provider</span></label>
        <input type="email" id="social-email" class="tc-input" autocomplete="email" />
      </div>
      <button type="button" id="social-continue" class="tc-btn tc-btn-primary tc-btn-block">Continue</button>
    </div>
    <div class="tc-divider">or email</div>
    <form id="login-form" class="tc-form">
      <div class="tc-field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required autocomplete="email" />
      </div>
      <div class="tc-field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required autocomplete="current-password" />
      </div>
      <p id="login-error" class="tc-error" hidden></p>
      <button type="submit" class="tc-btn tc-btn-primary tc-btn-block">Log in</button>
    </form>
    <p class="tc-footer-links"><a href="/forgot-password">Forgot password?</a> · No account? <a href="/signup">Sign up</a> · <a href="/signin">Demo profiles</a></p>
  </main>
  <script>
    const $ = (s) => document.querySelector(s);
    const $$ = (s) => Array.from(document.querySelectorAll(s));
    let provider = "";
    function showErr(msg) {
      const el = $("#login-error");
      el.hidden = !msg;
      el.textContent = msg || "";
    }
    function store(user, token) {
      localStorage.setItem("qoa_auth_token", token);
      localStorage.setItem("qoa_auth_user", JSON.stringify(user));
      const draft = sessionStorage.getItem("qoa_draft_requirement");
      if (user && user.profile_complete === false) {
        location.href = "/signup";
        return;
      }
      location.href = draft ? "/app?restore_draft=1" : "/app";
    }
    $$("[data-provider]").forEach((btn) => {
      btn.addEventListener("click", () => {
        provider = btn.dataset.provider;
        $("#social-provider-label").textContent = provider;
        $("#social-email-panel").hidden = false;
        $("#social-email").focus();
      });
    });
    $("#social-continue")?.addEventListener("click", async () => {
      showErr("");
      try {
        const res = await fetch("/api/auth/social", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ provider, email: $("#social-email").value.trim() }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || res.statusText);
        store(data.user, data.token);
      } catch (e) {
        showErr(e.message);
      }
    });
    $("#login-form").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      showErr("");
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: $("#login-email").value.trim(),
            password: $("#login-password").value,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || res.statusText);
        store(data.user, data.token);
      } catch (e) {
        showErr(e.message);
      }
    });
  </script>
</body>
</html>
