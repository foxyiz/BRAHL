<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in — QAonAir BRAHL</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="stylesheet" href="/assets/signin.css" />
</head>
<body class="signin-page">
  <header class="signin-header">
    <div class="signin-header-inner">
      <h1>Log in</h1>
      <p class="signin-lead">Access your projects and BRAHL plans.</p>
    </div>
    <a href="/app" class="secondary">Arena</a>
  </header>
  <main class="signin-main auth-form-main">
    <form id="login-form" class="auth-form">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" required autocomplete="email" />
      <label for="login-password">Password</label>
      <input type="password" id="login-password" required autocomplete="current-password" />
      <p id="login-error" class="hint auth-error" hidden></p>
      <button type="submit" class="primary">Log in</button>
    </form>
    <p class="signin-footer-hint">No account? <a href="/signup">Sign up</a> · <a href="/signin">Demo profiles</a></p>
  </main>
  <script>
    const $ = (s) => document.querySelector(s);
    $("#login-form").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const err = $("#login-error");
      err.hidden = true;
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: $("#login-email").value.trim(),
            password: $("#login-password").value,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || res.statusText);
        localStorage.setItem("qoa_auth_token", data.token);
        localStorage.setItem("qoa_auth_user", JSON.stringify(data.user));
        const draft = sessionStorage.getItem("qoa_draft_requirement");
        location.href = draft ? "/app?restore_draft=1" : "/app";
      } catch (e) {
        err.textContent = e.message;
        err.hidden = false;
      }
    });
  </script>
</body>
</html>
