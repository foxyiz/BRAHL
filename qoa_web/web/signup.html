<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up — QAonAir BRAHL</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="stylesheet" href="/assets/signin.css" />
</head>
<body class="signin-page">
  <header class="signin-header">
    <div class="signin-header-inner">
      <h1>Sign up</h1>
      <p class="signin-lead">Create your QAonAir account.</p>
    </div>
    <a href="/app" class="secondary">Arena</a>
  </header>
  <main class="signin-main auth-form-main">
    <form id="signup-form" class="auth-form">
      <label for="signup-name">Name</label>
      <input type="text" id="signup-name" autocomplete="name" />
      <label for="signup-email">Email</label>
      <input type="email" id="signup-email" required autocomplete="email" />
      <label for="signup-password">Password (8+ chars)</label>
      <input type="password" id="signup-password" required minlength="8" autocomplete="new-password" />
      <label for="signup-role">Role</label>
      <select id="signup-role">
        <option value="creator">Creator</option>
        <option value="qa_hunter">QA Hunter</option>
        <option value="both">Creator + QA Hunter</option>
      </select>
      <p id="signup-error" class="hint auth-error" hidden></p>
      <button type="submit" class="primary">Create account</button>
    </form>
    <p class="signin-footer-hint">Have an account? <a href="/login">Log in</a> · <a href="/signin">Demo profiles</a></p>
  </main>
  <script>
    const $ = (s) => document.querySelector(s);
    $("#signup-form").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const err = $("#signup-error");
      err.hidden = true;
      try {
        const res = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: $("#signup-name").value.trim(),
            email: $("#signup-email").value.trim(),
            password: $("#signup-password").value,
            role: $("#signup-role").value,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || res.statusText);
        localStorage.setItem("qoa_auth_token", data.token);
        localStorage.setItem("qoa_auth_user", JSON.stringify(data.user));
        const draft = sessionStorage.getItem("qoa_draft_requirement");
        location.href = draft ? "/app?restore_draft=1" : "/app";
      } catch (e) {
        err.textContent = e.message;
        err.hidden = false;
      }
    });
  </script>
</body>
</html>
