<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="description" content="BRAHL Web — pick a demo profile and walk Creator, QA Hunter, or Nalanda journeys." />

  <title>Sign in — BRAHL Web</title>

  <link rel="stylesheet" href="/assets/styles.css" />

  <link rel="stylesheet" href="/assets/signin.css" />

</head>

<body class="signin-page">

  <div id="demo-banner" class="demo-banner" role="status">

    <span>Demo — fictional personas (P1–P9)</span>

  </div>



  <header class="signin-header">

    <div class="signin-header-inner">

      <div>

        <p class="signin-kicker">Demo profiles</p>

        <h1>Pick a demo profile</h1>

        <p class="signin-lead">

          Walk Creator, QA Hunter, or Nalanda journeys in the arena.

          No invite yet? <a href="/welcome">Start on the landing page</a>.

        </p>

      </div>

      <a href="/about" class="secondary signin-about-link">About BRAHL</a>

    </div>

  </header>



  <main class="signin-main">

    <h2 id="signin-profiles-heading" class="signin-section-title">Try demo — test profiles</h2>

    <div id="signin-grid" class="signin-grid" aria-live="polite"></div>

    <p class="signin-footnote">

      <span id="signin-trial-badge" class="signin-trial-badge" hidden></span>

      <button type="button" id="signin-reset" class="signin-reset">Clear session &amp; refresh list</button>

      · <a href="/welcome">Invite / landing</a>

      · Demo profiles use <code>localStorage</code> — not production auth.

    </p>

  </main>



  <script src="/assets/profiles.js"></script>

  <script src="/assets/invite-gate.js"></script>

  <script src="/assets/signin.js"></script>

</body>

</html>
