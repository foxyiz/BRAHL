# BRAHL Web — production stack (Bluehost VPS / Cloud)
# Usage: docker compose up -d

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brahl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brahl_dev_password}
      POSTGRES_DB: brahl
    volumes:
      - brahl-pg:/var/lib/postgresql/data
    restart: unless-stopped

  brahl-web:
    build:
      context: ..
      dockerfile: qoa_web/Dockerfile
    ports:
      - "8765:8765"
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://127.0.0.1:8765}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      QOA_ADMIN_TOKEN: ${QOA_ADMIN_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FOXYIZ_HEADLESS: "true"
      # Testing on brahl.qaonair.com: keep demo/guest open until Google OAuth is live.
      # Set QOA_ALLOW_DEMO=0 and QOA_AUTH_REQUIRED=1 when accounts are required.
      QOA_ALLOW_DEMO: ${QOA_ALLOW_DEMO:-1}
      QOA_AUTH_REQUIRED: ${QOA_AUTH_REQUIRED:-0}
      # Testing: leave Admin open. Set QOA_ADMIN_OPEN=0 when accounts are linked.
      QOA_ADMIN_OPEN: ${QOA_ADMIN_OPEN:-1}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_MEMBERSHIP: ${STRIPE_PRICE_MEMBERSHIP:-}
      DATABASE_URL: postgresql://brahl:${POSTGRES_PASSWORD:-brahl_dev_password}@db:5432/brahl
    volumes:
      - brahl-data:/app/qoa_web/data
    depends_on:
      - db
    restart: unless-stopped

volumes:
  brahl-pg:
  brahl-data:
